name: release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing Git tag to package and release
        required: true
        type: string
      prerelease:
        description: Mark the GitHub release as a prerelease
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ inputs.tag }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Validate lockfile
        run: |
          uv lock --check

      - name: Sync release dependencies
        run: |
          uv sync --frozen --no-default-groups --group test --extra rag

      - name: Run tests
        run: |
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 uv run python -m pytest -q

      - name: Build package
        run: |
          uv build

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: |
            dist/*
          generate_release_notes: true
          prerelease: ${{ inputs.prerelease }}
