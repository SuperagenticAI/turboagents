site_name: turboagents
site_description: TurboQuant-style KV-cache and vector compression infrastructure
site_url: https://superagenticai.github.io/turboagents/
repo_url: https://github.com/SuperagenticAI/turboagents
repo_name: SuperagenticAI/turboagents
use_directory_urls: false

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/favicon.png
  font:
    text: Space Grotesk
    code: IBM Plex Mono
  palette:
    - scheme: default
      primary: black
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy

extra:
  generator: false

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences

extra_css:
  - assets/extra.css

extra_javascript:
  - assets/extra.js

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Adapters: adapters.md
  - SurrealDB: surrealdb.md
  - CLI: cli.md
  - Benchmarks: benchmarks.md
  - Examples: examples.md
  - Deployment: deployment.md
  - Attribution: attribution.md
