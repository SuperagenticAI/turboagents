site_name: turboagents
site_description: TurboQuant-style KV-cache and vector compression infrastructure
site_url: https://superagenticai.github.io/turboagents
repo_url: https://github.com/SuperagenticAI/turboagents
repo_name: SuperagenticAI/turboagents

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/favicon.png
  palette:
    - scheme: default
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - content.code.copy

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences

extra_css:
  - assets/extra.css

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Status: status.md
  - Implemented:
      - Overview: implemented.md
      - Architecture: architecture.md
      - Adapters: adapters.md
      - SurrealDB: surrealdb.md
      - CLI: cli.md
      - Benchmarks: benchmarks.md
      - Examples: examples.md
      - Implementation Notes: implementation-notes.md
  - Deployment: deployment.md
  - Attribution: attribution.md
